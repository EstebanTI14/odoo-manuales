<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#1D9E75">
<title>Manuales Odoo</title>
<link rel="manifest" href="manifest.json">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #f5f5f0; color: #1a1a1a; height: 100dvh; display: flex; flex-direction: column; }

  header { background: #1D9E75; color: white; padding: 12px 16px; display: flex; align-items: center; gap: 10px; }
  header h1 { font-size: 16px; font-weight: 500; }
  .header-sub { font-size: 12px; opacity: 0.8; }
  .badge { background: rgba(255,255,255,0.2); font-size: 11px; padding: 2px 8px; border-radius: 20px; margin-left: auto; }

  .messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }

  .empty { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 32px; gap: 8px; }
  .empty-icon { width: 52px; height: 52px; background: #E1F5EE; border-radius: 14px; display: flex; align-items: center; justify-content: center; margin-bottom: 4px; }
  .empty-icon svg { width: 26px; height: 26px; fill: #1D9E75; }
  .empty h2 { font-size: 15px; font-weight: 500; }
  .empty p { font-size: 13px; color: #666; line-height: 1.5; max-width: 260px; }
  .suggestions { display: flex; flex-direction: column; gap: 6px; margin-top: 8px; width: 100%; max-width: 280px; }
  .sug { font-size: 12px; background: white; border: 1px solid #e0e0e0; border-radius: 8px; padding: 8px 12px; cursor: pointer; text-align: left; color: #444; }
  .sug:hover { background: #f0faf6; border-color: #1D9E75; color: #1D9E75; }

  .msg { display: flex; flex-direction: column; gap: 2px; max-width: 88%; }
  .msg.user { align-self: flex-end; align-items: flex-end; }
  .msg.bot { align-self: flex-start; align-items: flex-start; }
  .msg-label { font-size: 10px; color: #999; padding: 0 4px; }
  .bubble { padding: 10px 13px; border-radius: 12px; font-size: 14px; line-height: 1.6; white-space: pre-wrap; }
  .msg.user .bubble { background: #1D9E75; color: white; border-radius: 12px 12px 3px 12px; }
  .msg.bot .bubble { background: white; border: 1px solid #e8e8e8; border-radius: 12px 12px 12px 3px; }
  .typing { display: flex; gap: 4px; align-items: center; padding: 12px 14px; background: white; border: 1px solid #e8e8e8; border-radius: 12px 12px 12px 3px; }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: #bbb; animation: bounce 1.2s infinite; }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-5px)} }

  .warning { margin: 0 16px 8px; background: #FFF3CD; border: 1px solid #ffc107; color: #856404; border-radius: 8px; padding: 8px 12px; font-size: 12px; }

  .input-area { padding: 10px 12px 12px; background: white; border-top: 1px solid #e8e8e8; display: flex; gap: 8px; align-items: flex-end; }
  textarea { flex: 1; resize: none; border: 1px solid #ddd; border-radius: 10px; padding: 9px 12px; font-size: 14px; font-family: inherit; min-height: 40px; max-height: 100px; outline: none; line-height: 1.4; }
  textarea:focus { border-color: #1D9E75; }
  .send { width: 38px; height: 38px; background: #1D9E75; border: none; border-radius: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .send:hover { background: #0F6E56; }
  .send:disabled { background: #ddd; cursor: not-allowed; }
  .send svg { width: 16px; height: 16px; fill: white; }

  /* Config panel */
  .config-btn { background: rgba(255,255,255,0.15); border: none; color: white; width: 32px; height: 32px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .config-btn svg { width: 16px; height: 16px; fill: white; }
  .panel { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 100; align-items: flex-end; }
  .panel.open { display: flex; }
  .panel-inner { background: white; width: 100%; border-radius: 16px 16px 0 0; padding: 20px 16px 32px; max-height: 80vh; overflow-y: auto; }
  .panel-title { font-size: 15px; font-weight: 500; margin-bottom: 14px; }
  .manual-item { display: flex; align-items: center; gap: 8px; padding: 10px 0; border-bottom: 1px solid #f0f0f0; }
  .manual-icon { width: 32px; height: 32px; background: #E1F5EE; border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .manual-icon svg { width: 16px; height: 16px; fill: #1D9E75; }
  .manual-name { flex: 1; font-size: 13px; }
  .manual-remove { background: none; border: none; color: #ccc; font-size: 18px; cursor: pointer; line-height: 1; padding: 0 4px; }
  .manual-remove:hover { color: #e53935; }
  .add-btn { width: 100%; margin-top: 12px; padding: 10px; background: #f5f5f0; border: 1.5px dashed #ccc; border-radius: 10px; color: #666; font-size: 13px; cursor: pointer; }
  .add-btn:hover { background: #E1F5EE; border-color: #1D9E75; color: #1D9E75; }
  .url-input { width: 100%; border: 1px solid #ddd; border-radius: 8px; padding: 8px 10px; font-size: 13px; margin-top: 8px; outline: none; display: none; }
  .url-input.show { display: block; }
  .url-add-btn { width: 100%; margin-top: 6px; padding: 8px; background: #1D9E75; color: white; border: none; border-radius: 8px; font-size: 13px; cursor: pointer; display: none; }
  .url-add-btn.show { display: block; }
  .close-btn { width: 100%; margin-top: 14px; padding: 11px; background: #f5f5f0; border: none; border-radius: 10px; font-size: 14px; cursor: pointer; color: #444; }
</style>
</head>
<body>

<header>
  <svg width="24" height="24" viewBox="0 0 24 24" fill="white"><path d="M14 2H6C4.9 2 4 2.9 4 4V20C4 21.1 4.9 22 6 22H18C19.1 22 20 21.1 20 20V8L14 2ZM13 9V3.5L18.5 9H13Z"/></svg>
  <div>
    <h1>Manuales Odoo</h1>
    <div class="header-sub">Asistente de consultas internas</div>
  </div>
  <span class="badge" id="docBadge">0 manuales</span>
  <button class="config-btn" onclick="openPanel()">
    <svg viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.3.06-.61.06-.94s-.02-.64-.07-.94l2.03-1.58a.5.5 0 0 0 .12-.64l-1.92-3.32a.5.5 0 0 0-.61-.22l-2.39.96a7 7 0 0 0-1.62-.94l-.36-2.54A.49.49 0 0 0 14 2h-4a.49.49 0 0 0-.49.42l-.36 2.54a7.4 7.4 0 0 0-1.62.94l-2.39-.96a.48.48 0 0 0-.61.22L2.61 8.58a.47.47 0 0 0 .12.64l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58a.5.5 0 0 0-.12.64l1.92 3.32c.12.22.37.3.61.22l2.39-.96c.5.36 1.05.67 1.62.94l.36 2.54c.05.24.27.42.49.42h4c.24 0 .44-.18.49-.42l.36-2.54a7.4 7.4 0 0 0 1.62-.94l2.39.96c.24.1.49 0 .61-.22l1.92-3.32a.47.47 0 0 0-.12-.64l-2.01-1.58zM12 15.6A3.6 3.6 0 1 1 12 8.4a3.6 3.6 0 0 1 0 7.2z"/></svg>
  </button>
</header>

<div class="messages" id="messages">
  <div class="empty" id="emptyState">
    <div class="empty-icon"><svg viewBox="0 0 24 24"><path d="M20 2H4C2.9 2 2 2.9 2 4V22L6 18H20C21.1 18 22 17.1 22 16V4C22 2.9 21.1 2 20 2ZM13 11H11V9H13V11ZM13 7H11V5H13V7Z"/></svg></div>
    <h2>Hola, ¿en qué te ayudo?</h2>
    <p>Hacé una pregunta sobre los manuales de Odoo de tu empresa.</p>
    <div class="suggestions">
      <button class="sug" onclick="ask('¿Cómo crear una factura en Odoo?')">¿Cómo crear una factura?</button>
      <button class="sug" onclick="ask('¿Cómo registrar un pago de cliente?')">¿Cómo registrar un pago?</button>
      <button class="sug" onclick="ask('¿Cómo crear un nuevo usuario en Odoo?')">¿Cómo crear un usuario?</button>
    </div>
  </div>
</div>

<div class="warning" id="noManualWarn" style="display:none">
  ⚠️ No hay manuales cargados. Configurá los manuales desde el ícono de ajustes arriba.
</div>

<div class="input-area">
  <textarea id="inputBox" placeholder="Escribí tu pregunta aquí..." rows="1"></textarea>
  <button class="send" id="sendBtn" onclick="sendMsg()">
    <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
  </button>
</div>

<!-- Panel de configuración -->
<div class="panel" id="configPanel" onclick="closePanel(event)">
  <div class="panel-inner">
    <div class="panel-title">Manuales cargados</div>
    <div id="manualList"></div>
    <button class="add-btn" onclick="toggleUrlInput()">+ Agregar manual (URL de OneDrive)</button>
    <input class="url-input" id="urlInput" placeholder="Pegá el link de descarga directa del PDF..." />
    <input type="text" class="url-input" id="nameInput" placeholder="Nombre del manual (ej: Manual de Facturación)" style="margin-top:6px;" />
    <button class="url-add-btn" id="urlAddBtn" onclick="addManual()">Agregar manual</button>
    <button class="close-btn" onclick="document.getElementById('configPanel').classList.remove('open')">Cerrar</button>
  </div>
</div>

<script>
let manuals = JSON.parse(localStorage.getItem('odoo_manuals') || '[]');
let history = [];
let loading = false;

function saveManuals() { localStorage.setItem('odoo_manuals', JSON.stringify(manuals)); }

function renderManuals() {
  const list = document.getElementById('manualList');
  list.innerHTML = '';
  manuals.forEach((m, i) => {
    list.innerHTML += `
      <div class="manual-item">
        <div class="manual-icon"><svg viewBox="0 0 24 24"><path d="M14 2H6C4.9 2 4 2.9 4 4V20C4 21.1 4.9 22 6 22H18C19.1 22 20 21.1 20 20V8L14 2ZM13 9V3.5L18.5 9H13Z"/></svg></div>
        <span class="manual-name">${m.name}</span>
        <button class="manual-remove" onclick="removeManual(${i})">×</button>
      </div>`;
  });
  document.getElementById('docBadge').textContent = manuals.length + (manuals.length === 1 ? ' manual' : ' manuales');
}

function removeManual(i) { manuals.splice(i, 1); saveManuals(); renderManuals(); }

function toggleUrlInput() {
  document.getElementById('urlInput').classList.toggle('show');
  document.getElementById('nameInput').classList.toggle('show');
  document.getElementById('urlAddBtn').classList.toggle('show');
}

function addManual() {
  const url = document.getElementById('urlInput').value.trim();
  const name = document.getElementById('nameInput').value.trim();
  if (!url || !name) return alert('Completá el nombre y la URL del manual.');
  manuals.push({ name, url });
  saveManuals(); renderManuals();
  document.getElementById('urlInput').value = '';
  document.getElementById('nameInput').value = '';
  toggleUrlInput();
}

function openPanel() { document.getElementById('configPanel').classList.add('open'); renderManuals(); }
function closePanel(e) { if (e.target.id === 'configPanel') document.getElementById('configPanel').classList.remove('open'); }

function addMsg(role, text) {
  document.getElementById('emptyState')?.remove();
  const el = document.createElement('div');
  el.className = `msg ${role === 'user' ? 'user' : 'bot'}`;
  el.innerHTML = `<div class="msg-label">${role === 'user' ? 'Vos' : 'Asistente'}</div><div class="bubble">${text}</div>`;
  document.getElementById('messages').appendChild(el);
  document.getElementById('messages').scrollTop = 99999;
  return el;
}

function addTyping() {
  document.getElementById('emptyState')?.remove();
  const el = document.createElement('div');
  el.className = 'msg bot';
  el.innerHTML = `<div class="msg-label">Asistente</div><div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
  document.getElementById('messages').appendChild(el);
  document.getElementById('messages').scrollTop = 99999;
  return el;
}

function ask(q) { document.getElementById('inputBox').value = q; sendMsg(); }

async function sendMsg() {
  const input = document.getElementById('inputBox');
  const q = input.value.trim();
  if (!q || loading) return;
  if (manuals.length === 0) {
    document.getElementById('noManualWarn').style.display = 'block';
    setTimeout(() => { document.getElementById('noManualWarn').style.display = 'none'; }, 3000);
    return;
  }
  loading = true;
  document.getElementById('sendBtn').disabled = true;
  input.value = '';
  input.style.height = 'auto';
  addMsg('user', q);
  const typing = addTyping();
  history.push({ role: 'user', content: q });
  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ question: q, pdfUrls: manuals.map(m => m.url), history: history.slice(-6) })
    });
    const data = await res.json();
    typing.remove();
    const answer = data.content?.[0]?.text || 'No se pudo obtener una respuesta.';
    history.push({ role: 'assistant', content: answer });
    addMsg('bot', answer);
  } catch(e) {
    typing.remove();
    addMsg('bot', 'Error de conexión. Intentá de nuevo.');
  }
  loading = false;
  document.getElementById('sendBtn').disabled = false;
  input.focus();
}

document.getElementById('inputBox').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); }
});
document.getElementById('inputBox').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 100) + 'px';
});

if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');
renderManuals();
</script>
</body>
</html>
